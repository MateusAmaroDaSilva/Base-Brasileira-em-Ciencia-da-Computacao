[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    -m "not slow"

markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    elasticsearch: Tests using Elasticsearch
    database: Tests using Database
